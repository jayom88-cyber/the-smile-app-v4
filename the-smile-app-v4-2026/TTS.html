<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Digital Houdini | J&V Future Ventures</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0b0f19; 
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .ferrari-glow {
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0f19;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between antialiased">

    <header class="w-full max-w-4xl mx-auto px-4 pt-6">
        <div class="glass-panel rounded-2xl p-4 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="h-3 w-3 rounded-full bg-red-500 animate-pulse"></div>
                <div>
                    <h1 class="text-sm font-bold uppercase tracking-widest text-slate-200">The Digital Houdini</h1>
                    <p class="text-xs text-slate-400">J&V FUTURE VENTURES • CUSTOM TTS ENGINE</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-[10px] bg-slate-800 text-slate-400 font-mono px-2 py-1 rounded border border-slate-700">v1.2-LIVE</span>
                <span id="system-status" class="text-xs font-mono font-bold uppercase tracking-wider text-slate-400">System Idle</span>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-4xl glass-panel ferrari-glow rounded-3xl p-6 sm:p-8 space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Active Voice Matrix</label>
                    <select id="voice-selection" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none focus:border-red-500 transition-colors">
                        <option value="">Loading Hardware Voices...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Engine Controller Panel</label>
                    <div class="grid grid-cols-5 gap-2">
                        <button id="btn-prev" class="bg-slate-800 hover:bg-slate-700 text-slate-200 py-3 rounded-xl font-bold transition-all transform active:scale-95 border border-slate-700">⏮</button>
                        <button id="btn-stop" class="bg-slate-800 hover:bg-red-950/40 text-red-400 py-3 rounded-xl font-bold transition-all transform active:scale-95 border border-slate-700 hover:border-red-900">⏹</button>
                        <button id="btn-start" class="col-span-2 bg-red-600 hover:bg-red-500 text-white py-3 rounded-xl font-bold uppercase tracking-wider text-sm transition-all transform active:scale-95 shadow-lg shadow-red-600/20">Execute</button>
                        <button id="btn-next" class="bg-slate-800 hover:bg-slate-700 text-slate-200 py-3 rounded-xl font-bold transition-all transform active:scale-95 border border-slate-700">⏭</button>
                    </div>
                </div>
            </div>

            <div class="flex justify-end">
                <button id="btn-pause-resume" class="hidden text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 font-mono font-bold uppercase px-4 py-2 rounded-lg border border-slate-700 transition-all">⏸ Pause</button>
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">Vocal Manifestation Repository</label>
                <textarea id="raw-text-input" class="w-full h-48 bg-slate-950 border border-slate-800 rounded-2xl p-4 text-sm font-mono leading-relaxed text-slate-300 focus:outline-none focus:border-red-500/50 transition-colors resize-none" placeholder="Inject text infrastructure here to break down and manifest locally..."></textarea>
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">Engine Chunk Orchestrator</label>
                <div class="w-full h-40 bg-slate-950 border border-slate-800 rounded-2xl p-4 overflow-y-auto">
                    <ul id="chunk-list-display" class="space-y-2 font-mono text-xs text-slate-500">
                        <li class="italic text-slate-600">> System stands ready. Provide text to initialize parsing array...</li>
                    </ul>
                </div>
            </div>

        </div>
    </main>

    <footer class="w-full max-w-4xl mx-auto px-4 pb-6 text-center">
        <p class="text-[10px] text-slate-600 font-mono uppercase tracking-widest">Jai-Verse Digital Ecosystem • Secure Data Vault Infrastructure</p>
    </footer>

    <script>
        // Native Hardware Integration Layer
        const JaiVerse = {
            Voice: {
                synth: window.speechSynthesis,
                speakNative: function(text, voice, onEndCallback = null) {
                    this.synth.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(text);
                    if (voice) utterance.voice = voice;
                    if (onEndCallback) utterance.onend = onEndCallback;
                    this.synth.speak(utterance);
                },
                cancel: function() {
                    this.synth.cancel();
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            // UI Element Handles
            const voiceSelection = document.getElementById('voice-selection');
            const statusDisplay = document.getElementById('system-status');
            const rawTextInput = document.getElementById('raw-text-input');
            const chunkListDisplay = document.getElementById('chunk-list-display');
            
            const btnStart = document.getElementById('btn-start');
            const btnStop = document.getElementById('btn-stop');
            const btnPauseResume = document.getElementById('btn-pause-resume');
            const btnNext = document.getElementById('btn-next');
            const btnPrev = document.getElementById('btn-prev');

            // Engine Tracking Matrices
            let globalChunks = [];
            let currentChunkIndex = 0;
            let isPaused = false;
            let isRunning = false;
            let intentionalSkip = false;
            let hardwareVoices = [];

            // Populate Audio Drivers
            function populateVoiceMatrix() {
                hardwareVoices = JaiVerse.Voice.synth.getVoices();
                if (hardwareVoices.length === 0) return;
                
                voiceSelection.innerHTML = '';
                hardwareVoices.forEach((voice, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = `${voice.name} (${voice.lang})`;
                    if (voice.default) option.selected = true;
                    voiceSelection.appendChild(option);
                });
            }

            populateVoiceMatrix();
            if (undefined !== window.speechSynthesis.onvoiceschanged) {
                window.speechSynthesis.onvoiceschanged = populateVoiceMatrix;
            }

            // Text Parsing Pipeline
            function breakTextIntoChunks(text) {
                if (!text.trim()) return [];
                // Regular Expression mapping complete structural boundaries
                return text.match(/[^.!?]+[.!?]+/g) || [text];
            }

            // Audio Core Iteration Engine
            function playCurrentChunk() {
                if (!isRunning || currentChunkIndex >= globalChunks.length || currentChunkIndex < 0) {
                    stopEngine();
                    return;
                }

                intentionalSkip = false;
                updateVisualInterface();

                const textToSpeak = globalChunks[currentChunkIndex].trim();
                const selectedVoice = hardwareVoices[voiceSelection.value] || null;

                statusDisplay.innerText = `[CHUNK ${currentChunkIndex + 1}/${globalChunks.length}] PLAYING`;
                statusDisplay.className = "text-red-400 font-mono font-bold uppercase tracking-wider";

                JaiVerse.Voice.speakNative(textToSpeak, selectedVoice, () => {
                    if (!intentionalSkip && isRunning) {
                        currentChunkIndex++;
                        if (currentChunkIndex < globalChunks.length) {
                            playCurrentChunk();
                        } else {
                            stopEngine();
                        }
                    }
                });
            }

            function updateVisualInterface() {
                chunkListDisplay.innerHTML = '';
                globalChunks.forEach((chunk, index) => {
                    const li = document.createElement('li');
                    li.id = `chunk-item-${index}`;
                    
                    if (index < currentChunkIndex) {
                        li.innerText = `✓ CHUNK ${index + 1}: ${chunk.substring(0, 30)}... [CLEARED]`;
                        li.className = "text-slate-700 line-through pl-2";
                    } else if (index === currentChunkIndex) {
                        li.innerText = `⚡ CHUNK ${index + 1}: ${chunk}`;
                        li.className = "text-red-400 font-bold border-l-2 border-red-500 pl-2 bg-red-950/10 py-1 rounded-r shadow-sm";
                    } else {
                        li.innerText = `> CHUNK ${index + 1}: ${chunk.substring(0, 45)}... [PENDING]`;
                        li.className = "text-slate-500 pl-2";
                    }
                    chunkListDisplay.appendChild(li);
                });

                // Auto Scroll to current item
                const activeItem = document.getElementById(`chunk-item-${currentChunkIndex}`);
                if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            // Control Implementations
            function startEngine() {
                const rawText = rawTextInput.value;
                globalChunks = breakTextIntoChunks(rawText);

                if (globalChunks.length === 0) {
                    statusDisplay.innerText = "ERROR: EMPTY MANIFEST";
                    statusDisplay.className = "text-amber-500 font-mono font-bold";
                    return;
                }

                isRunning = true;
                currentChunkIndex = 0;
                isPaused = false;
                btnPauseResume.innerText = "⏸ Pause";
                btnPauseResume.classList.remove('hidden');
                
                playCurrentChunk();
            }

            function stopEngine() {
                isRunning = false;
                isPaused = false;
                globalChunks = [];
                currentChunkIndex = 0;
                JaiVerse.Voice.cancel();
                
                btnPauseResume.classList.add('hidden');
                statusDisplay.innerText = "SYSTEM IDLE";
                statusDisplay.className = "text-slate-400 font-mono font-bold uppercase tracking-wider";
                chunkListDisplay.innerHTML = '<li class="italic text-slate-600">> System stands ready. Provide text to initialize parsing array...</li>';
            }

            function togglePauseResume() {
                if (!isRunning) return;

                if (!isPaused) {
                    JaiVerse.Voice.synth.pause();
                    isPaused = true;
                    btnPauseResume.innerText = "▶️ Resume";
                    statusDisplay.innerText = "ENGINE PAUSED";
                    statusDisplay.className = "text-amber-400 font-mono font-bold";
                } else {
                    JaiVerse.Voice.synth.resume();
                    isPaused = false;
                    btnPauseResume.innerText = "⏸ Pause";
                    statusDisplay.innerText = `[CHUNK ${currentChunkIndex + 1}/${globalChunks.length}] PLAYING`;
                    statusDisplay.className = "text-red-400 font-mono font-bold";
                }
            }

            function skipNext() {
                if (isRunning && currentChunkIndex < globalChunks.length - 1) {
                    intentionalSkip = true;
                    JaiVerse.Voice.cancel();
                    currentChunkIndex++;
                    if (isPaused) {
                        isPaused = false;
                        btnPauseResume.innerText = "⏸ Pause";
                    }
                    setTimeout(() => playCurrentChunk(), 50);
                }
            }

            function skipPrev() {
                if (isRunning && currentChunkIndex > 0) {
                    intentionalSkip = true;
                    JaiVerse.Voice.cancel();
                    currentChunkIndex--;
                    if (isPaused) {
                        isPaused = false;
                        btnPauseResume.innerText = "⏸ Pause";
                    }
                    setTimeout(() => playCurrentChunk(), 50);
                }
            }

            // Wire Interface Listeners
            btnStart.addEventListener('click', startEngine);
            btnStop.addEventListener('click', stopEngine);
            btnPauseResume.addEventListener('click', togglePauseResume);
            btnNext.addEventListener('click', skipNext);
            btnPrev.addEventListener('click', skipPrev);
        });
    </script>
</body>
</html>
